# AWS EC2 deployment - Milestone 1 & 2
# Usage: docker compose -f docker-compose.aws.yml up -d
# Prerequisites: config/prometheus/prometheus.yml, config/grafana/provisioning/

version: "3.8"

services:
  parabank:
    image: parasoft/parabank:latest
    container_name: parabank
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/parabank/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - test-backbone

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    depends_on:
      - parabank
    networks:
      - test-backbone

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - test-backbone

networks:
  test-backbone:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
